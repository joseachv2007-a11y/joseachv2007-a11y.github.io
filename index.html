<!DOCTYPE html>
<html lang="es">
<head>
    <title>Registro del Fanáticos del Mundial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor">
        <img src="img/titulo.png" width="400">
        <h1>Registro del Fanáticos del Mundial</h1>

        <form>
            <label>Nombre:</label>
            <input type="text" placeholder="Escribe tu nombre">

            <label>Equipo favorito:</label>
            <select name="Equipo favorito" id="Equipo favorito">
                <option>Elige tu equipo favorito</option>
                <option value="Catar">Catar</option>
                <option value="Italia">Italia</option>
                <option value="Bolivia">Bolivia</option>
                <option value="Japón">Japón</option>
                <option value="Marruecos">Marruecos</option>
                <option value="Portugal">Portugal</option>
                <option value="Croacia">Croacia</option>
                <option value="Costa Rica">Costa Rica</option>
                <option value="Argentina">Argentina</option>
                <option value="Inglaterra">Inglaterra</option>
                <option value="Venezuela">Venezuela</option>
                <option value="Egipto">Egipto</option>
                <option value="México">México</option>
                <option value="Corea del Sur">Corea del Sur</option>
                <option value="Suiza">Suiza</option>
                <option value="Alemania">Alemania</option>
                <option value="El Salvador">El Salvador</option>
                <option value="Colombia">Colombia</option>
                <option value="Brasil">Brasil</option>
                <option value="Honduras">Honduras</option>
                <option value="Estados Unidos">Estados Unidos</option>
                <option value="Paraguay">Paraguay</option>
                <option value="Panamá">Panamá</option>
                <option value="Francia">Francia</option>
                <option value="Chile">Chile</option>
                <option value="Canadá">Canadá</option>
                <option value="Arabia Saudita">Arabia Saudita</option>
                <option value="Corea del Norte">Corea del Norte</option>
                <option value="Indonesia">Indonesia</option>
            </select>

            <label>Correo:</label>
            <input type="email" placeholder="Escribe tu correo">

            <label>Comentario:</label>
            <textarea placeholder="Deja tu comentario aquí"></textarea>

            <button type="submit">Registrarse</button>
        </form>
        </div>

        <div class="comentarios">
            <h2>Comentarios de los Fans del Mundial</h2>
        </div>
        <div class="caja">
            <p><b>Juan:</b> Vamos Argentina 🎉</p>
            <p><b>María:</b> Brasil será campeón 🔥</p>
            <p><b>Jose:</b> Argentina es una mierda</p>
            <p><b>Andres:</b> JAJAJA ustedes si se matan por esa verga </p>
        </div>

</body>
</html>
